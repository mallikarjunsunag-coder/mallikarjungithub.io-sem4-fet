<!DOCTYPE html>
<html>
<head>
  <title>Z-Index Color Toggle</title>

  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
    }

   
    #container {
      width: 300px;
      margin: auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
      margin-top: 20px;

      position: relative;
      z-index: 10;   

      transition: 0.5s;
    }

  
    .darkMode {
      background: black;
      color: white;

      z-index: 20;  
    }

    input, select, button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
    }

    .inline {
      width: auto;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;

      position: relative;
      z-index: 30;
    }

    button:hover {
      background: darkgreen;
    }
  </style>
</head>

<body>

<div id="container">

  <h2>Feedback Form</h2>

  Name:
  <input type="text">

  <br><br>

  
  <button onclick="toggleColor()">
    Toggle Color
  </button>

</div>

<script>
function toggleColor() {

  let box = document.getElementById("container");

  box.classList.toggle("darkMode");
}
</script>

</body>
</html>
