<!DOCTYPE html>
<html>
<head>
  <title>Advanced Feedback Form</title>
  <style>
    body {
      font-family: Arial;
      background: #eef2f3;
    }
    #container {
      width: 450px;
      margin: auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      margin-top: 20px;
    }
    input, select, button {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
    }
    .inline {
      width: auto;
    }
    table {
      width: 90%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
    }
    table, th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #28a745;
      color: white;
    }
  </style>
</head>
<body>

<div id="container">
  <h2>Feedback Form</h2>

  Name:
  <input type="text" id="username">

  Gender:
  <input type="radio" name="gender" value="Male" class="inline"> Male
  <input type="radio" name="gender" value="Female" class="inline"> Female
  <br><br>

  Rating:
  <select id="rating">
    <option value="">Select</option>
    <option>Excellent</option>
    <option>Good</option>
    <option>Average</option>
  </select>

  Interests (Checkbox):
  <input type="checkbox" name="interest" value="Design" class="inline"> Design
  <input type="checkbox" name="interest" value="Speed" class="inline"> Speed
  <input type="checkbox" name="interest" value="Content" class="inline"> Content
  <br><br>

  Features (List Box):
  <select id="features" multiple>
    <option>UI</option>
    <option>Performance</option>
    <option>Security</option>
    <option>Support</option>
  </select>

  <button onclick="submitFeedback()">Submit</button>

  <p id="error" style="color:red;"></p>
</div>

<!-- Table -->
<table id="feedbackTable">
  <tr>
    <th>Name</th>
    <th>Gender</th>
    <th>Rating</th>
    <th>Interests</th>
    <th>Features</th>
  </tr>
</table>

<script>
function submitFeedback() {
  let name = document.getElementById("username").value;
  let rating = document.getElementById("rating").value;

  // Gender
  let gender = "";
  let radios = document.getElementsByName("gender");
  for (let r of radios) {
    if (r.checked) gender = r.value;
  }

  // Checkboxes
  let interests = [];
  let checks = document.getElementsByName("interest");
  for (let c of checks) {
    if (c.checked) interests.push(c.value);
  }

  // List box
  let features = [];
  let featureSelect = document.getElementById("features");
  for (let opt of featureSelect.options) {
    if (opt.selected) features.push(opt.value);
  }

  let error = document.getElementById("error");

  if (name === "" || gender === "" || rating === "") {
    error.innerHTML = "Please fill required fields!";
    return;
  }

  error.innerHTML = "";

  // Add to table
  let table = document.getElementById("feedbackTable");
  let row = table.insertRow();

  row.insertCell(0).innerHTML = name;
  row.insertCell(1).innerHTML = gender;
  row.insertCell(2).innerHTML = rating;
  row.insertCell(3).innerHTML = interests.join(", ");
  row.insertCell(4).innerHTML = features.join(", ");

  // Reset form
  document.getElementById("username").value = "";
  document.getElementById("rating").value = "";
  for (let r of radios) r.checked = false;
  for (let c of checks) c.checked = false;
  for (let opt of featureSelect.options) opt.selected = false;
}
</script>

</body>
</html>
